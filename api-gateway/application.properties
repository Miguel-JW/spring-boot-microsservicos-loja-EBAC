server.port=8080
spring.application.name=api-gateway

spring.cloud.gateway.routes[0].id=pedido-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/pedidos/**

spring.cloud.gateway.routes[1].id=produto-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/produtos/**

spring.cloud.gateway.routes[2].id=pagamento-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/pagamentos/**

spring.cloud.gateway.routes[3].id=notificacao-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/notificacoes/**
