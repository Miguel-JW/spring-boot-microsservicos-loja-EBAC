server.port=8081
spring.application.name=pedido-service
spring.datasource.url=jdbc:h2:mem:pedidodb
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# URLs dos outros servicos
produto.service.url=http://localhost:8082
pagamento.service.url=http://localhost:8083
notificacao.service.url=http://localhost:8084

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.produto.slidingWindowSize=5
resilience4j.circuitbreaker.instances.produto.failureRateThreshold=50
resilience4j.circuitbreaker.instances.produto.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.pagamento.slidingWindowSize=5
resilience4j.circuitbreaker.instances.pagamento.failureRateThreshold=50
resilience4j.circuitbreaker.instances.pagamento.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.notificacao.slidingWindowSize=5
resilience4j.circuitbreaker.instances.notificacao.failureRateThreshold=50
resilience4j.circuitbreaker.instances.notificacao.waitDurationInOpenState=10s
